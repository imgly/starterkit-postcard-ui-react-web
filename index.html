<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CE.SDK Postcard UI Starterkit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-primary: #471aff;
        --color-primary-hover: #3d15d9;
        --color-text: #161617;
        --color-text-secondary: rgba(22, 22, 23, 0.65);
        --color-border: #e0e0e8;
        --color-bg: #f8f9fc;
        --color-white: #ffffff;
        --font-family:
          'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        --border-radius: 8px;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* CSS Reset - matches showcases-app styles */
      *,
      *::before,
      *::after {
        border-style: solid;
        border-width: 0;
        box-sizing: border-box;
      }

      button {
        background-color: transparent;
        padding: 0;
        cursor: pointer;
      }

      button,
      input,
      optgroup,
      select,
      textarea {
        font-family: inherit;
        font-size: 100%;
        line-height: inherit;
        color: inherit;
        margin: 0;
        padding: 0;
      }

      img,
      svg,
      video,
      canvas {
        display: block;
      }

      img,
      video {
        height: auto;
        max-width: 100%;
      }

      *:focus {
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: var(--font-family);
        background: var(--color-bg);
        color: var(--color-text);
      }

      body.no-scroll {
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
